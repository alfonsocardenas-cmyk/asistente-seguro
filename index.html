<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Pini – Asistente de Alfonso Cárdenas | GNP Seguros</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#e8edf4;display:flex;justify-content:center;align-items:center;min-height:100vh}
    .app{width:100%;max-width:430px;height:100svh;max-height:820px;display:flex;flex-direction:column;background:#f0f4f9;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.13)}
    @media(min-width:500px){.app{border-radius:22px;height:820px}}

    /* HEADER */
    .hdr{background:linear-gradient(135deg,#002d72,#0057b8);padding:13px 16px;display:flex;align-items:center;gap:11px;flex-shrink:0}
    .hdr-av{position:relative;flex-shrink:0}
    .hdr-av span{width:46px;height:46px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid rgba(255,255,255,.35)}
    .dot{width:11px;height:11px;border-radius:50%;background:#22c55e;border:2px solid #fff;position:absolute;bottom:1px;right:1px}
    .hdr-txt{flex:1}
    .hdr-name{font-size:15px;font-weight:700;color:#fff}
    .hdr-sub{font-size:11px;color:rgba(255,255,255,.72);margin-top:2px}
    .hdr-badge{font-size:10px;font-weight:600;color:rgba(255,255,255,.55);letter-spacing:.4px;text-transform:uppercase}

    /* MESSAGES */
    .msgs{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:9px;background:#f0f4f9}
    .msgs::-webkit-scrollbar{width:3px}
    .msgs::-webkit-scrollbar-thumb{background:#c5d0de;border-radius:3px}

    .row{display:flex;align-items:flex-end;gap:7px}
    .row.u{flex-direction:row-reverse}
    .av{width:30px;height:30px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.08)}

    .bbl{max-width:80%;padding:10px 14px;font-size:14px;line-height:1.65;animation:pop .16s ease}
    @keyframes pop{from{opacity:0;transform:scale(.95) translateY(3px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .bbl.a{background:#fff;border-radius:4px 16px 16px 16px;box-shadow:0 1px 5px rgba(0,0,0,.07);color:#1a1a2e}
    .bbl.u{background:#002d72;border-radius:16px 16px 4px 16px;color:#fff}
    .bbl p{margin:2px 0}

    /* QUICK BUTTONS */
    .qbtns{padding:4px 12px 8px;display:flex;flex-wrap:wrap;gap:7px;background:#f0f4f9}
    .qb{font-size:13px;font-weight:500;padding:8px 16px;border-radius:22px;border:1.5px solid #bed0e8;background:#fff;color:#002d72;cursor:pointer;transition:all .15s;white-space:nowrap}
    .qb:hover{background:#e8f0fb;border-color:#0057b8}
    .qb:active{transform:scale(.97)}

    /* INPUT */
    .inp-row{display:flex;gap:8px;padding:10px 12px 12px;background:#fff;border-top:1px solid #e0e7ef;flex-shrink:0}
    .inp-row input{flex:1;font-size:14px;padding:10px 14px;border-radius:22px;border:1.5px solid #d0dae8;font-family:inherit;color:#333;background:#f7f9fc;transition:border .15s}
    .inp-row input:focus{outline:none;border-color:#0057b8;background:#fff}
    .send{padding:10px 18px;font-size:14px;border-radius:22px;border:none;background:#002d72;color:#fff;font-weight:600;cursor:pointer;transition:background .15s;white-space:nowrap}
    .send:hover{background:#003fa3}
    .send:disabled{background:#b0bec5;cursor:default}

    .typing-bbl{background:#fff;border-radius:4px 16px 16px 16px;padding:10px 16px;font-size:13px;color:#888;box-shadow:0 1px 5px rgba(0,0,0,.07)}

    /* WHATSAPP BTN */
    .wa-btn{display:flex;align-items:center;gap:8px;background:#25d366;color:#fff;border:none;border-radius:12px;padding:11px 18px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .15s;width:100%}
    .wa-btn:hover{background:#1ebe5d}
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-av">
      <span>🐾</span>
      <div class="dot"></div>
    </div>
    <div class="hdr-txt">
      <div class="hdr-name">Pini 🐾</div>
      <div class="hdr-sub">Asistente de Alfonso Cárdenas</div>
    </div>
    <div class="hdr-badge">GNP Seguros</div>
  </div>

  <!-- MESSAGES -->
  <div class="msgs" id="msgs"></div>

  <!-- QUICK BUTTONS -->
  <div class="qbtns" id="qbtns"></div>

  <!-- INPUT -->
  <div class="inp-row">
    <input id="inp" type="text" placeholder="Escribe aquí tu mensaje..." onkeydown="if(event.key==='Enter')sendMsg()"/>
    <button class="send" id="send-btn" onclick="sendMsg()">Enviar</button>
  </div>

</div>

<script>
const WA_NUMBER = '5537787103';

const SYSTEM = `Eres Pini, el asistente virtual amigable y profesional de Alfonso Cárdenas, agente autorizado de GNP Seguros.

PERSONALIDAD:
- Cálido, empático y cercano. Hablas como una persona real, no como un robot.
- Usas emojis con moderación (1-2 por mensaje máximo).
- Haces UNA pregunta a la vez, nunca un interrogatorio.
- Frases que usas naturalmente: "con gusto te ayudo", "no te preocupes, yo te voy guiando", "déjame ayudarte con eso", "vamos juntos paso a paso", "te explico fácil".
- Nunca suenas urgente ni vendedor agresivo. La idea es acompañar, no presionar.
- Si no sabes algo con certeza, lo dices honestamente y ofreces pasarlo con Alfonso.

FLUJO PRINCIPAL:
1. El usuario llega → ya se le mostró el mensaje de bienvenida con botones "Ya soy cliente" / "Quiero cotizar"
2. Si es CLIENTE: pídele número de póliza o correo → usa el conocimiento base para resolver sus dudas → ofrece ayuda adicional
3. Si quiere COTIZAR: pregunta tipo de seguro → edad → ciudad → presupuesto aproximado (opcional) → al final ofrece conectarlo con Alfonso por WhatsApp
4. SIEMPRE cerrar con una acción concreta (WhatsApp, más info, etc.)

CAPTURA DE LEAD - MUY IMPORTANTE:
Cuando ya tengas: nombre, tipo de seguro, edad y ciudad del prospecto, genera este bloque especial exactamente así:
[LEAD_LISTO:nombre=NOMBRE|seguro=TIPO|edad=EDAD|ciudad=CIUDAD]

Cuando no sepas algo: di "Buena pregunta 😊 Para darte una respuesta exacta prefiero que Alfonso lo revise directamente. ¿Quieres que te conecte con él ahora?"

TELÉFONO EMERGENCIAS GNP (24/7): 55 5227 9000

═══ CONOCIMIENTO GNP SEGUROS ═══

── SEGURO DE AUTOS ──
COBERTURAS PRINCIPALES:
• Daños Materiales Pérdida Parcial: colisión, vuelcos, incendio, granizo, inundación, huracán, terremoto, vandalismo. Pérdida parcial = daño menor al 65% del valor.
• Daños Materiales Pérdida Total: mismos riesgos cuando daño supera el 65% del valor.
• Cristales: reposición de parabrisas, lunas, quemacocos.
• Robo Total: si no se recupera en 30 días se indemniza al 100%.
• Responsabilidad Civil Daños a Terceros: daños materiales y lesiones a terceros. SIN deducible. Opera en México, EUA y Canadá.
• Responsabilidad Civil Ocupantes: lesiones o muerte de ocupantes del vehículo asegurado.
• Gastos Médicos Ocupantes: hospitalización, ambulancia, médicos, gastos funerarios (sublímite $50,000 MN).
• Robo Parcial: robo de autopartes originales (espejos, faros, radio, tablero, asientos, etc.)
• Robo Parcial Plus: igual pero incluye neumáticos y rines.
• Club GNP (auxilio vial): paso de corriente, 5 litros combustible, cambio de llanta, cerrajero, grúa local $3,500 MN. Límite: 5 servicios.
• Club GNP Plus: mismos servicios, grúa $7,000 MN, 10 servicios.
• Auto Sustituto: vehículo de reemplazo tras pérdida total o robo total.
• Auto Sustituto Plus: también aplica en pérdidas parciales.
• Protección Legal: defensa jurídica en accidentes.
• Paga Cero / Cero Deducible: elimina deducible en pérdida total y robo total.
• Siempre en Agencia: reparación garantizada en agencia de la marca.
• Conductor Protegido: gastos médicos del conductor principal en otro vehículo.
• Garantía Autos Financiados: cubre diferencia entre saldo del crédito e indemnización.
• Robo Artículos Personales: celular, laptop, tableta, cámara, reloj dentro del vehículo en asalto.

PROCEDIMIENTO EN SINIESTRO DE AUTO:
1. Llama al 55 5227 9000 (24/7) o reporta por app "Soy Cliente GNP"
2. NO hagas arreglos con terceros sin autorización de GNP
3. En robo: levanta acta ante el Ministerio Público
4. Documentos: licencia vigente, identificación oficial, tarjeta de circulación
5. GNP tiene 30 días para pagar desde que recibe documentación completa
6. IMPORTANTE: el seguro NO cubre uso en Uber, Cabify, Rappi, taxi ni transporte comercial

── SEGURO DE MASCOTAS "MI MASCOTA GNP" ──
Cubre: perros y gatos de 3 meses a 9 años (renovable hasta 14 años)

COBERTURA BÁSICA (siempre incluida):
• Responsabilidad Civil: daños que tu mascota cause a terceros. Espera: 10 días.

COBERTURAS ADICIONALES:
• Gastos Médicos Veterinarios por accidente (espera 10 días): atropellamiento, ataques, traumatismos, ingesta objetos extraños, golpe de calor, envenenamiento accidental.
• Gastos Médicos por enfermedad (espera 180 días): enfermedades no prevenibles con emergencia médica.
• Incluye: consulta, medicamentos, análisis, cirugías, hospitalización +24hrs.
• Estancia en guardería/hotel: $200/día máximo $2,000 por vigencia.
• Fallecimiento de mascota: por accidente o enfermedad crónica (espera 360 días).
• Robo con violencia: robo de la mascota con violencia (espera 10 días).

ASISTENCIAS (llama al 55 5227 9000 Opción 8-4):
Orientación veterinaria 24/7, desparasitación, pipeta antipulgas, vacuna antirrábica anual, cremación, esterilización, consulta veterinaria a domicilio, baño y peluquería, referencias de guarderías pet friendly.

NO CUBRE: enfermedades preexistentes, vacunas preventivas, extravío, mal trato o abandono, peleas o actividades ilícitas.

═══ CÓMO COTIZAR ═══
Para AUTO necesito: año/marca/modelo del vehículo, estado donde circula, si tiene financiamiento, coberturas deseadas.
Para MASCOTA necesito: especie (perro/gato), raza, edad, historial médico.
Cuando tengas los datos → genera el bloque [LEAD_LISTO:...] y ofrece conectar con Alfonso por WhatsApp.`;

let history = [];
let leadData = {};
let showingQuick = true;

function addMsg(role, html) {
  const msgs = document.getElementById('msgs');
  const row = document.createElement('div');
  row.className = 'row ' + (role === 'user' ? 'u' : '');
  if (role === 'assistant') {
    row.innerHTML = `<div class="av">🐾</div><div class="bbl a">${html}</div>`;
  } else {
    row.innerHTML = `<div class="bbl u">${html}</div>`;
  }
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function setQuickBtns(btns) {
  const el = document.getElementById('qbtns');
  el.innerHTML = '';
  btns.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'qb';
    btn.textContent = b;
    btn.onclick = () => { clearQuickBtns(); sendMsg(b); };
    el.appendChild(btn);
  });
}

function clearQuickBtns() {
  document.getElementById('qbtns').innerHTML = '';
}

function showWAButton(text, waText) {
  const msgs = document.getElementById('msgs');
  const wrap = document.createElement('div');
  wrap.className = 'row';
  wrap.innerHTML = `<div class="av">🐾</div><div style="max-width:80%">
    <div class="bbl a"><p>${text}</p></div>
    <button class="wa-btn" onclick="openWA('${waText}')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.553 4.116 1.522 5.847L.057 23.882l6.198-1.625A11.935 11.935 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.007-1.373l-.36-.214-3.724.976.996-3.63-.234-.374A9.818 9.818 0 0112 2.182c5.42 0 9.818 4.398 9.818 9.818S17.42 21.818 12 21.818z"/></svg>
      Hablar con Alfonso por WhatsApp
    </button>
  </div>`;
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function openWA(text) {
  const encoded = encodeURIComponent(text);
  window.open(`https://wa.me/${WA_NUMBER}?text=${encoded}`, '_blank');
}

function parseLead(text) {
  const match = text.match(/\[LEAD_LISTO:([^\]]+)\]/);
  if (!match) return null;
  const parts = {};
  match[1].split('|').forEach(p => {
    const [k, v] = p.split('=');
    parts[k] = v;
  });
  return parts;
}

function buildWAText(lead) {
  return `Hola Alfonso! 👋 Me contacté a través de Pini y me interesa una cotización de seguro.

📋 *Mis datos:*
• Nombre: ${lead.nombre || 'No proporcionado'}
• Tipo de seguro: ${lead.seguro || 'No especificado'}
• Edad: ${lead.edad || 'No proporcionada'}
• Ciudad: ${lead.ciudad || 'No proporcionada'}

¿Me puedes ayudar? 😊`;
}

function setLoading(on) {
  document.getElementById('send-btn').disabled = on;
  const msgs = document.getElementById('msgs');
  if (on) {
    const t = document.createElement('div');
    t.className = 'row'; t.id = 'typing';
    t.innerHTML = '<div class="av">🐾</div><div class="typing-bbl">Escribiendo...</div>';
    msgs.appendChild(t);
    msgs.scrollTop = msgs.scrollHeight;
  } else {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }
}

function fmtText(t) {
  return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').split('\n').map(l=>`<p>${l}</p>`).join('');
}

async function sendMsg(override) {
  const inp = document.getElementById('inp');
  const msg = override || inp.value.trim();
  if (!msg) return;
  inp.value = '';
  clearQuickBtns();
  addMsg('user', `<p>${msg}</p>`);
  history.push({ role: 'user', content: msg });
  setLoading(true);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: SYSTEM, messages: history })
    });
    const data = await res.json();
    let reply = data.content?.map(b => b.text).join('') || 'Hubo un problema, intenta de nuevo.';

    const lead = parseLead(reply);
    reply = reply.replace(/\[LEAD_LISTO:[^\]]+\]/g, '').trim();

    history.push({ role: 'assistant', content: reply });
    setLoading(false);

    if (lead) {
      addMsg('assistant', fmtText(reply));
      setTimeout(() => {
        showWAButton(
          '¡Todo listo! 🙌 Aquí abajo puedes hablar directamente con Alfonso para recibir tu cotización personalizada:',
          buildWAText(lead)
        );
      }, 400);
    } else {
      addMsg('assistant', fmtText(reply));
    }
  } catch {
    setLoading(false);
    addMsg('assistant', '<p>Ups, hubo un problema de conexión. Por favor intenta de nuevo 😊</p>');
  }
}

// INICIO
window.onload = () => {
  setTimeout(() => {
    addMsg('assistant', '<p>Hola 👋 soy <strong>Pini</strong>, asistente de <strong>Alfonso Cárdenas</strong>.</p><p>Estoy aquí para ayudarte de forma clara y rápida 😊</p><p>Cuéntame, ¿ya tienes una póliza con nosotros o te gustaría hacer una cotización?</p>');
    setQuickBtns(['✅ Ya soy cliente', '📋 Quiero cotizar']);
  }, 300);
};
</script>
</body>
</html>
